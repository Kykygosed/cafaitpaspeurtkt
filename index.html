<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Application</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
}

img {
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    opacity: 0;
    animation: fadeIn 4s ease forwards;
}

@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}
</style>
</head>

<body>

<audio id="music" autoplay>
    <source src="badpiggies.mp3" type="audio/mpeg">
</audio>

<img src="jobapplication.png" alt="Job Application">

<script>
// Certains navigateurs bloquent l'autoplay.
// Cette tentative supplémentaire augmente les chances de lecture.
window.addEventListener("load", () => {
    const music = document.getElementById("music");
    music.play().catch(() => {
        console.log("Lecture automatique bloquée par le navigateur.");
    });
});
</script>

</body>
</html>
